
Greg:
    display_name: "Gregory Odegard"
    role: faculty
    image: img/people/GregOdegard.jpg
    webpage: https://pages.mtu.edu/~gmodegar/
    bio: Prof. Gregory Odegard is the John O. Hallquist Endowed Chair in Computational Mechanics in the Department of Mechanical and Aerospace Engineering at Michigan Tech. Before joining the faculty at Michigan Tech, Greg was a researcher at NASA Langley Research Center from 2000-2004. He is the recipient of the NASA Outstanding Public Leadership Medal, is a Fellow of ASME and ASC, and an Associate Fellow of AIAA.

Sagar:
    display_name: "Sagar U. Patil"
    role: staff
    image: img/people/Sagar.jpg
    bio: Sagar Patil is a Research Engineer at the Computational Materials Modeling and Research (CMMR) Lab at Michigan Technological University. His work lies at the intersection of computational materials science and engineering, where he leverages atomistic simulations, multi-scale modeling, and experimental integration to investigate and develop high-performance materials. With a focus on understanding structure–property relationships at multiple scales, Sagar contributes to advancing materials for energy, aerospace, and structural applications. His approach bridges theory and practice, providing predictive insight into material behavior under complex environments.

