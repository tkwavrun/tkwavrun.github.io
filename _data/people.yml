    bio: Mallory Metzger will obtained her B.S. in Chemical Engineering with minors in German and Mathematics from Michigan Technological University (MTU) in spring 2026. She has since continued her education in 2026 as an accelerated masters student in MTU's MAE Department. Her current and future research focuses on process modeling of high performance polymers via molecular dynamics simulation.

